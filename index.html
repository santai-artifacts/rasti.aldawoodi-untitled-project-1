<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c1018;
    --panel: #141a26;
    --panel-2: #1b2433;
    --grid: #161d2b;
    --line: #222c3d;
    --text: #e8edf6;
    --muted: #8a98b0;
    --accent: #4ade80;
    --accent-dim: #22c55e;
    --food: #fb7185;
    --food-glow: rgba(251, 113, 133, 0.5);
    --shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -20%, #16203100, #0c1018),
      radial-gradient(900px 500px at 50% 120%, #102016, #0c1018);
    color: var(--text);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .title { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: linear-gradient(145deg, var(--accent), var(--accent-dim));
    display: grid; place-items: center;
    box-shadow: 0 8px 20px -6px rgba(74, 222, 128, 0.6);
    font-size: 20px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--muted); font-weight: 500; }

  .scores { display: flex; gap: 8px; }

  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 7px 12px;
    text-align: center;
    min-width: 60px;
  }
  .stat .label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--muted);
  }
  .stat .value {
    font-size: 20px; font-weight: 700; line-height: 1.1;
    font-variant-numeric: tabular-nums;
    transition: color 0.2s ease, transform 0.15s ease;
  }
  .stat .value.bump { transform: scale(1.18); }
  #streak.lit { color: var(--accent); }

  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 14px;
    box-shadow: var(--shadow);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 12px;
    background: var(--grid);
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    text-align: center;
    background: rgba(10, 14, 22, 0.82);
    backdrop-filter: blur(6px);
    transition: opacity 0.25s ease;
    padding: 24px;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  /* combo badge */
  .combo {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .combo.hidden { opacity: 0; }
  .combo-mult {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fde68a;
    text-shadow: 0 2px 14px rgba(251, 191, 36, 0.55);
  }
  .combo-mult .lbl { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.12em; }
  .combo-mult.pulse { animation: comboPulse 0.3s ease; }
  @keyframes comboPulse {
    0% { transform: scale(1); }
    45% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .combo-bar {
    width: 92px; height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }
  .combo-bar > div {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #fbbf24, #fb7185);
    border-radius: 99px;
    transform-origin: left;
  }

  /* floating points popup */
  .popup {
    position: fixed;
    transform: translate(-50%, -50%);
    font-weight: 700;
    font-size: 16px;
    color: #fde68a;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 50;
    animation: floatUp 0.7s ease forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, -40%) scale(0.8); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -160%) scale(1.05); }
  }

  .overlay h2 { font-size: 28px; letter-spacing: -0.02em; margin-bottom: 6px; }
  .overlay p { color: var(--muted); font-size: 14px; margin-bottom: 18px; max-width: 280px; }

  .btn {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: #07120b;
    background: linear-gradient(145deg, var(--accent), var(--accent-dim));
    border: none;
    border-radius: 12px;
    padding: 12px 26px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease;
    box-shadow: 0 10px 24px -10px rgba(74, 222, 128, 0.7);
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .keys { display: flex; gap: 6px; flex-wrap: wrap; }
  kbd {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 7px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text);
  }

  .ghost {
    font-family: inherit;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .ghost:hover { border-color: var(--accent-dim); }
  .ghost:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 420px) {
    h1 { font-size: 22px; }
    .footer { flex-direction: column; align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    .btn, .overlay { transition: none; }
    .btn:hover { transform: none; }
    .combo-mult.pulse { animation: none; }
    .popup { animation: floatUpReduced 0.7s ease forwards; }
    .stat .value.bump { transform: none; }
  }
  @keyframes floatUpReduced {
    0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <div class="logo">🐍</div>
        <h1>Snake<span> · classic</span></h1>
      </div>
      <div class="scores">
        <div class="stat">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">Streak</div>
          <div class="value" id="streak">0×</div>
        </div>
        <div class="stat">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="board" width="420" height="420" aria-label="Snake game board"></canvas>
      <div class="combo hidden" id="combo" aria-hidden="true">
        <div class="combo-mult" id="comboMult">×2 <span class="lbl">COMBO</span></div>
        <div class="combo-bar"><div id="comboFill"></div></div>
      </div>
      <div class="overlay" id="overlay">
        <div>
          <h2 id="ov-title">Ready?</h2>
          <p id="ov-text">Use the arrow keys or WASD to steer. Eat the food, grow long, don't bite yourself.</p>
          <button class="btn" id="startBtn">Start Game</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="keys">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
        <span style="align-self:center">or</span>
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        <span style="align-self:center">·</span>
        <kbd>Space</kbd><span style="align-self:center">pause</span>
      </div>
      <button class="ghost" id="speedBtn" title="Cycle game speed">Speed: Normal</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const streakEl = document.getElementById('streak');
  const comboEl = document.getElementById('combo');
  const comboMultEl = document.getElementById('comboMult');
  const comboFillEl = document.getElementById('comboFill');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovText = document.getElementById('ov-text');
  const startBtn = document.getElementById('startBtn');
  const speedBtn = document.getElementById('speedBtn');

  // --- Config ---
  const GRID = 21;               // cells per side
  const CELL = canvas.width / GRID;
  const SPEEDS = [
    { name: 'Chill',  ms: 150 },
    { name: 'Normal', ms: 110 },
    { name: 'Fast',   ms: 75  },
  ];

  // --- Combo config ---
  const BASE = 10;               // base points per food
  const MAX_MULT = 9;            // multiplier cap
  const WINDOW_MAX = 3000;       // ms you get to grab the next food at combo 1
  const WINDOW_MIN = 1300;       // tightest window at high combos

  // --- State (in-memory only) ---
  let snake, dir, nextDir, food, score, best = 0, speedIdx = 1;
  let state = 'idle';            // idle | running | paused | over
  let acc = 0, last = 0, raf = null;
  let popT = 0, popCell = null;  // food-eaten pop animation
  let combo = 0, comboTimer = 0, comboWindow = WINDOW_MAX, bestCombo = 0;

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
      { x: mid - 3, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = '0';
    combo = 0;
    comboTimer = 0;
    bestCombo = 0;
    streakEl.textContent = '0×';
    streakEl.classList.remove('lit');
    hideCombo();
    placeFood();
  }

  function placeFood() {
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function hideCombo() {
    comboEl.classList.add('hidden');
  }

  function bump(el) {
    if (reduceMotion) return;
    el.classList.remove('bump');
    void el.offsetWidth;        // restart transition
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 160);
  }

  function spawnPopup(cell, pts, mult) {
    const rect = canvas.getBoundingClientRect();
    const scale = rect.width / canvas.width;
    const px = rect.left + (cell.x * CELL + CELL / 2) * scale;
    const py = rect.top + (cell.y * CELL + CELL / 2) * scale;
    const el = document.createElement('div');
    el.className = 'popup';
    el.textContent = mult > 1 ? `+${pts} ×${mult}` : `+${pts}`;
    el.style.left = px + 'px';
    el.style.top = py + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 720);
  }

  // Called when food is eaten. Returns points earned.
  function registerCombo(cell) {
    combo = comboTimer > 0 ? combo + 1 : 1;
    comboWindow = Math.max(WINDOW_MIN, WINDOW_MAX - combo * 220);
    comboTimer = comboWindow;

    const mult = Math.min(combo, MAX_MULT);
    const gained = BASE * mult;

    if (combo > bestCombo) {
      bestCombo = combo;
      streakEl.textContent = bestCombo + '×';
      streakEl.classList.add('lit');
      bump(streakEl);
    }

    // badge only shows once a multiplier is actually in play
    if (mult > 1) {
      comboMultEl.innerHTML = `×${mult} <span class="lbl">COMBO</span>`;
      comboEl.classList.remove('hidden');
      if (!reduceMotion) {
        comboMultEl.classList.remove('pulse');
        void comboMultEl.offsetWidth;
        comboMultEl.classList.add('pulse');
      }
    } else {
      hideCombo();
    }

    spawnPopup(cell, gained, mult);
    return gained;
  }

  function setOverlay(title, text, btn) {
    ovTitle.textContent = title;
    ovText.textContent = text;
    startBtn.textContent = btn;
    overlay.classList.remove('hidden');
  }

  function start() {
    reset();
    state = 'running';
    overlay.classList.add('hidden');
    last = performance.now();
    acc = 0;
  }

  function gameOver() {
    state = 'over';
    if (score > best) { best = score; bestEl.textContent = best; }
    hideCombo();
    const streakNote = bestCombo >= 2 ? ` Best streak: ×${bestCombo}.` : '';
    setOverlay('Game Over', `You scored ${score} point${score === 1 ? '' : 's'}.${streakNote} Tap start to try again.`, 'Play Again');
  }

  function togglePause() {
    if (state === 'running') {
      state = 'paused';
      setOverlay('Paused', 'Take a breath. Your snake will wait right here.', 'Resume');
    } else if (state === 'paused') {
      state = 'running';
      overlay.classList.add('hidden');
      last = performance.now();
    }
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) {
      return gameOver();
    }
    // self collision (ignore tail tip since it moves away, unless we just ate)
    const ate = head.x === food.x && head.y === food.y;
    const body = ate ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);
    if (ate) {
      popT = 1;
      popCell = { x: food.x, y: food.y };
      score += registerCombo(popCell);
      scoreEl.textContent = score;
      bump(scoreEl);
      placeFood();
    } else {
      snake.pop();
    }
  }

  // --- Rendering ---
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    // background grid
    ctx.fillStyle = '#161d2b';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
    }

    // food
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.save();
    ctx.shadowColor = 'rgba(251, 113, 133, 0.55)';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#fb7185';
    roundRect(fx + CELL * 0.2, fy + CELL * 0.2, CELL * 0.6, CELL * 0.6, CELL * 0.18);
    ctx.fill();
    ctx.restore();

    // food-eaten pop ring
    if (popT > 0 && popCell) {
      const t = 1 - popT;
      ctx.strokeStyle = `rgba(251, 113, 133, ${popT})`;
      ctx.lineWidth = 2;
      const cx = popCell.x * CELL + CELL / 2;
      const cy = popCell.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, CELL * (0.3 + t * 0.7), 0, Math.PI * 2);
      ctx.stroke();
    }

    // snake
    const n = snake.length;
    for (let i = n - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / Math.max(1, n - 1);          // 0 head -> 1 tail
      const pad = 1 + t * 1.5;
      // gradient from bright head to dim tail
      const g = Math.round(74 + (34 - 74) * t);
      const r = Math.round(222 + (140 - 222) * t * 0.4);
      ctx.fillStyle = i === 0 ? '#86efac' : `rgb(${34 + (1-t)*40}, ${190 - t*70}, ${120 - t*40})`;
      roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, CELL * 0.28);
      ctx.fill();
    }

    // eyes on head
    const head = snake[0];
    ctx.fillStyle = '#07120b';
    const hx = head.x * CELL, hy = head.y * CELL;
    const ex = dir.x, ey = dir.y;
    const e1x = hx + CELL / 2 + (ex * CELL * 0.18) + (ey !== 0 ? CELL * 0.18 : 0);
    const e1y = hy + CELL / 2 + (ey * CELL * 0.18) + (ex !== 0 ? CELL * 0.18 : 0);
    const e2x = hx + CELL / 2 + (ex * CELL * 0.18) - (ey !== 0 ? CELL * 0.18 : 0);
    const e2y = hy + CELL / 2 + (ey * CELL * 0.18) - (ex !== 0 ? CELL * 0.18 : 0);
    ctx.beginPath(); ctx.arc(e1x, e1y, CELL * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x, e2y, CELL * 0.07, 0, Math.PI * 2); ctx.fill();
  }

  function loop(now) {
    raf = requestAnimationFrame(loop);
    const dt = now - last;
    last = now;
    if (popT > 0) popT = Math.max(0, popT - dt / 320);

    if (state === 'running') {
      // combo decay
      if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) {
          comboTimer = 0;
          combo = 0;
          hideCombo();
          streakEl.classList.remove('lit');
        }
        comboFillEl.style.transform = 'scaleX(' + Math.max(0, comboTimer / comboWindow) + ')';
      }

      acc += dt;
      const interval = SPEEDS[speedIdx].ms;
      while (acc >= interval) {
        acc -= interval;
        step();
        if (state !== 'running') break;
      }
    }
    draw();
  }

  // --- Input ---
  const DIRS = {
    ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  };

  function steer(nd) {
    // prevent 180° reversal
    if (nd.x === -dir.x && nd.y === -dir.y) return;
    nextDir = nd;
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (state === 'running' || state === 'paused') togglePause();
      else start();
      return;
    }
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (DIRS[key]) {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
      steer(DIRS[key]);
    }
  });

  startBtn.addEventListener('click', () => {
    if (state === 'paused') togglePause();
    else start();
  });

  speedBtn.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    speedBtn.textContent = 'Speed: ' + SPEEDS[speedIdx].name;
  });

  // touch / swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) { // tap = pause/start
      if (state === 'running' || state === 'paused') togglePause();
      else start();
      touchStart = null;
      return;
    }
    if (state === 'idle' || state === 'over') start();
    if (Math.abs(dx) > Math.abs(dy)) steer({ x: dx > 0 ? 1 : -1, y: 0 });
    else steer({ x: 0, y: dy > 0 ? 1 : -1 });
    touchStart = null;
  }, { passive: true });

  // --- Boot ---
  reset();
  draw();
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
