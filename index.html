<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121821;
    --panel-2: #1a2230;
    --grid: #161d28;
    --accent: #36e27b;
    --accent-dim: #1f7a45;
    --food: #ff5c7a;
    --text: #e7eef7;
    --muted: #7e8aa0;
    --radius: 18px;
    --shadow: 0 20px 60px -20px rgba(0,0,0,.7);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(54,226,123,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,92,122,.08), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 520px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
  }

  .title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: linear-gradient(145deg, var(--accent), var(--accent-dim));
    display: grid;
    place-items: center;
    box-shadow: 0 8px 24px -8px rgba(54,226,123,.7);
  }
  .logo svg { width: 22px; height: 22px; display: block; }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .subtitle {
    margin: 2px 0 0;
    font-size: 13px;
    color: var(--muted);
  }

  .scores {
    display: flex;
    gap: 10px;
  }
  .score-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 14px;
    padding: 8px 14px;
    min-width: 78px;
    text-align: center;
  }
  .score-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
  }
  .score-card .value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / var(--cell) var(--cell),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / var(--cell) var(--cell),
      var(--panel-2);
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 12px;
    background: rgba(8, 12, 17, .82);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 24px;
    transition: opacity .25s ease;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .overlay h2 {
    margin: 0;
    font-size: 30px;
    letter-spacing: -0.02em;
  }
  .overlay p {
    margin: 0;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.5;
    font-size: 14px;
  }

  .btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    color: #06140b;
    background: linear-gradient(145deg, var(--accent), var(--accent-dim));
    padding: 12px 26px;
    border-radius: 12px;
    box-shadow: 0 12px 28px -10px rgba(54,226,123,.8);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 18px 34px -12px rgba(54,226,123,.9); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .speed {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .seg {
    display: inline-flex;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 11px;
    padding: 3px;
  }
  .seg button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .seg button.active {
    background: var(--panel-2);
    color: var(--text);
  }

  .hint {
    font-size: 12.5px;
    color: var(--muted);
  }
  .hint kbd {
    font-family: inherit;
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,.08);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--text);
  }

  footer {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 420px) {
    header { flex-direction: column; align-items: stretch; }
    .scores { justify-content: flex-end; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#06140b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 7h8a3 3 0 0 1 0 6H7a3 3 0 0 0 0 6h10" />
            <circle cx="18" cy="7" r="1.4" fill="#06140b" stroke="none" />
          </svg>
        </div>
        <div>
          <h1>Snake</h1>
          <p class="subtitle">Eat, grow, don't bite yourself.</p>
        </div>
      </div>
      <div class="scores">
        <div class="score-card">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-card">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="board" width="420" height="420"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Ready?</h2>
        <p id="overlayText">Use the arrow keys or WASD to steer. On touch, swipe in any direction. Grab the food, dodge the walls and yourself.</p>
        <button class="btn" id="startBtn">Play</button>
      </div>
    </div>

    <div class="controls">
      <div class="speed">
        <span>Speed</span>
        <div class="seg" id="speedSeg" role="group" aria-label="Speed">
          <button data-speed="140">Chill</button>
          <button data-speed="100" class="active">Normal</button>
          <button data-speed="65">Fast</button>
        </div>
      </div>
      <div class="hint">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> / <kbd>WASD</kbd> &nbsp;·&nbsp; <kbd>Space</kbd> pause
      </div>
    </div>

    <footer>Tip: swipe on mobile · your best score is kept for this session</footer>
  </div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const speedSeg = document.getElementById('speedSeg');

  const GRID = 21;                 // cells per side
  const CELL = canvas.width / GRID;
  canvas.style.setProperty('--cell', (100 / GRID) + '%');

  // Game state
  let snake, dir, nextDir, food, score, best = 0;
  let tickMs = 100;
  let loopId = null;
  let lastTick = 0;
  let running = false;
  let paused = false;
  let gameOver = false;
  // smooth render interpolation
  let prevSnake = [];

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
      { x: mid - 3, y: mid },
    ];
    prevSnake = snake.map(s => ({ ...s }));
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    gameOver = false;
    paused = false;
    placeFood();
    updateScore();
  }

  function placeFood() {
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    food = free.length ? free[Math.floor(Math.random() * free.length)] : null;
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
  }

  function setDirection(nx, ny) {
    // prevent reversing directly into self
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  function step() {
    dir = nextDir;
    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    // wall collision
    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) return die();
    // self collision (ignore tail tip which will move, unless growing)
    const willGrow = food && nx === food.x && ny === food.y;
    const body = willGrow ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === nx && s.y === ny)) return die();

    prevSnake = snake.map(s => ({ ...s }));
    snake.unshift({ x: nx, y: ny });

    if (willGrow) {
      score++;
      updateScore();
      placeFood();
      if (!food) return win();
    } else {
      snake.pop();
    }
  }

  function die() {
    gameOver = true;
    running = false;
    showOverlay('Game Over', `You scored ${score} point${score === 1 ? '' : 's'}.` +
      (score === best && score > 0 ? ' New best! 🏆' : ''), 'Play again');
  }

  function win() {
    gameOver = true;
    running = false;
    showOverlay('You Win! 🎉', `You filled the whole board with ${score} points. Legendary.`, 'Play again');
  }

  // ---- Rendering ----
  function lerp(a, b, t) { return a + (b - a) * t; }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  }

  function draw(alpha) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // food (pulsing)
    if (food) {
      const t = (Math.sin(performance.now() / 250) + 1) / 2;
      const pad = CELL * (0.18 + t * 0.05);
      const fx = food.x * CELL, fy = food.y * CELL;
      ctx.save();
      ctx.shadowColor = 'rgba(255,92,122,.8)';
      ctx.shadowBlur = 16;
      ctx.fillStyle = '#ff5c7a';
      roundRect(fx + pad, fy + pad, CELL - pad * 2, CELL - pad * 2, (CELL - pad * 2) / 2.5);
      ctx.fill();
      ctx.restore();
    }

    // snake with interpolation
    const n = snake.length;
    for (let i = n - 1; i >= 0; i--) {
      const cur = snake[i];
      const prev = prevSnake[i] || prevSnake[prevSnake.length - 1] || cur;
      const ix = lerp(prev.x, cur.x, alpha);
      const iy = lerp(prev.y, cur.y, alpha);

      const head = i === 0;
      const shade = 1 - i / Math.max(n, 14) * 0.55;
      const g = ctx.createLinearGradient(ix * CELL, iy * CELL, (ix + 1) * CELL, (iy + 1) * CELL);
      g.addColorStop(0, `rgba(${54 + (1 - shade) * 0}, ${Math.round(226 * shade)}, ${Math.round(123 * shade + 30)}, 1)`);
      g.addColorStop(1, `rgba(31, ${Math.round(122 * shade + 30)}, 69, 1)`);

      const pad = head ? CELL * 0.06 : CELL * 0.12;
      ctx.save();
      if (head) {
        ctx.shadowColor = 'rgba(54,226,123,.6)';
        ctx.shadowBlur = 14;
      }
      ctx.fillStyle = g;
      roundRect(ix * CELL + pad, iy * CELL + pad, CELL - pad * 2, CELL - pad * 2, CELL * 0.32);
      ctx.fill();
      ctx.restore();

      // eyes on head
      if (head) {
        ctx.fillStyle = '#06140b';
        const ex = ix * CELL, ey = iy * CELL;
        const eo = CELL * 0.28, es = CELL * 0.10;
        const dx = dir.x, dy = dir.y;
        const e1x = ex + CELL/2 + (dy !== 0 ? -eo : dx * eo*0.5) - es/2;
        // simpler: place two eyes offset perpendicular to direction
        const cx = ex + CELL/2, cy = ey + CELL/2;
        const perp = { x: -dir.y, y: dir.x };
        const fwd = CELL * 0.18;
        const side = CELL * 0.20;
        [1, -1].forEach(sgn => {
          const exx = cx + dir.x * fwd + perp.x * side * sgn;
          const eyy = cy + dir.y * fwd + perp.y * side * sgn;
          ctx.beginPath();
          ctx.arc(exx, eyy, es, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }
  }

  // ---- Loop ----
  function frame(ts) {
    if (running && !paused) {
      if (!lastTick) lastTick = ts;
      const elapsed = ts - lastTick;
      if (elapsed >= tickMs) {
        step();
        lastTick = ts;
      }
      const alpha = gameOver ? 1 : Math.min((ts - lastTick) / tickMs, 1);
      draw(alpha);
    } else if (!running) {
      draw(1);
    } else {
      draw(1); // paused — static
    }
    loopId = requestAnimationFrame(frame);
  }

  function startGame() {
    reset();
    running = true;
    lastTick = 0;
    hideOverlay();
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      showOverlay('Paused', 'Take a breath. Press Space or tap Resume to continue.', 'Resume');
    } else {
      lastTick = 0;
      hideOverlay();
    }
  }

  function showOverlay(title, text, btn) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = btn;
    overlay.classList.remove('hidden');
  }
  function hideOverlay() { overlay.classList.add('hidden'); }

  // ---- Input ----
  startBtn.addEventListener('click', () => {
    if (paused) { togglePause(); }
    else { startGame(); }
  });

  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (!running && !paused) { startGame(); }
      else { togglePause(); }
      return;
    }
    if (keyMap[e.key]) {
      e.preventDefault();
      if (!running) return;
      setDirection(keyMap[e.key][0], keyMap[e.key][1]);
    }
  });

  // Touch / swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  // Speed selector
  speedSeg.addEventListener('click', (e) => {
    const b = e.target.closest('button');
    if (!b) return;
    tickMs = parseInt(b.dataset.speed, 10);
    [...speedSeg.children].forEach(c => c.classList.toggle('active', c === b));
  });

  // Boot
  reset();
  draw(1);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
